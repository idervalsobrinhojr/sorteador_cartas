<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Baralho de Imagens</title>

    <!-- Ícone -->
    <link rel="icon" href="icon-192.png">

    <!-- Manifest (PWA) -->
     <link rel="manifest" href="manifest.json">
     <meta name="theme-color" content="#ffffff">

<style>
  body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
  }

  button {
    margin: 10px;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }

  .area-cartas {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .carta {
    margin: 10px;
  }

  img {
    max-width: 400px;
    border-radius: 8px;
  }
</style>
</head>

<body>

<h1>Baralho de Cartas 🎴</h1>

<button onclick="retirarCarta()">Retirar Carta</button>
<button onclick="embaralharDeck()">Embaralhar o Deck</button>
<button onclick="resetarDeck()">Recolher cartas e Embaralhar o Deck</button>

<div class="area-cartas" id="mesa"></div>

<script>

//////////////////////////////////////////////////////////////

//////////////////////////////////////////////////////////////

  { nome: "Carta 9", arquivo: "imagens/carta09.png" },
  { nome: "Carta 10", arquivo: "imagens/carta10.png" },
  { nome: "Carta 11", arquivo: "imagens/carta11.png" },
  { nome: "Carta 12", arquivo: "imagens/carta12.png" },
  { nome: "Carta 13", arquivo: "imagens/carta13.png" },

  { nome: "Carta 16", arquivo: "imagens/carta16.png" },
  { nome: "Carta 17", arquivo: "imagens/carta17.png" },
  { nome: "Carta 18", arquivo: "imagens/carta18.png" },

  { nome: "Carta 25", arquivo: "imagens/carta25.png" },

  { nome: "Carta 36", arquivo: "imagens/carta36.png" }
];
//////////////////////////////////////////////////////////////


// Estado do sistema
let deck = [];
let cartasRetiradas = [];

// Inicialização
resetarDeck();


// 🔀 Embaralhar (Fisher-Yates)
function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}


// 🎴 Retirar carta (sem reposição)
function retirarCarta() {
  if (deck.length === 0) {
    alert("Todas as cartas já foram retiradas!");
    return;
  }

  const carta = deck.pop(); // pega do topo
  cartasRetiradas.push(carta);

  mostrarCarta(carta);
}


// 🔀 Embaralhar apenas o deck restante
function embaralharDeck() {
  embaralhar(deck);
}


// ♻️ Recolher tudo + embaralhar
function resetarDeck() {
  deck = [...bancoOriginal]; // recria o deck completo
  cartasRetiradas = [];

  embaralhar(deck);

  document.getElementById("mesa").innerHTML = "";
}


// 🖼️ Mostrar carta na tela
function mostrarCarta(carta) {
  const mesa = document.getElementById("mesa");

  const div = document.createElement("div");
  div.className = "carta";

  div.innerHTML = `
    <p>${carta.nome}</p>
    <img src="${carta.arquivo}">
  `;

  mesa.appendChild(div);
}

</script>
