<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Baralho de Cartas</title>

<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b4332">

<style>
  body {
    font-family: 'Trebuchet MS', sans-serif;
    text-align: center;
    padding: 20px;
    margin: 0;

    background: radial-gradient(circle at center, #ecffb0 0%, #b9f624 40%, #6a9e00 100%);
    min-height: 100vh;
    color: #fff;
  }

  h1 {
    margin-bottom: 20px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
  }

  /* BOTÕES RPG */
  button {
    margin: 8px;
    padding: 12px 18px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;

    border: 2px solid #081c15;
    border-radius: 14px;

    background: linear-gradient(to bottom, #b185db, #7b2cbf);
    color: #fff;

    box-shadow:
      0 6px #5a189a,
      0 8px 14px rgba(0,0,0,0.5);

    transition: all 0.15s ease;
  }

  button:active {
    transform: translateY(4px);
    box-shadow:
      0 2px #1b4332,
      0 4px 6px rgba(0,0,0,0.5);
  }

  .area-cartas {
    margin-top: 25px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .carta {
    margin: 12px;
    text-align: center;
    animation: surgir 0.5s ease;
  }

  /* ANIMAÇÃO DE COMPRA */
  @keyframes surgir {
    from {
      transform: translateY(-40px) scale(0.8);
      opacity: 0;
    }
    to {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
  }

  img {
    width: 400px;
    border-radius: 12px;

    box-shadow:
      0 12px 18px rgba(0,0,0,0.6),
      0 6px 8px rgba(0,0,0,0.4);

    border: 2px solid rgba(255,255,255,0.2);

    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  img:hover {
    transform: scale(1.08);
    box-shadow:
      0 16px 22px rgba(0,0,0,0.7),
      0 8px 12px rgba(0,0,0,0.5);
  }

  .carta p {
    margin-bottom: 6px;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
  }
</style>
</head>

<body>

<h1>Baralho de Cartas 🎴</h1>

<button onclick="retirarCarta()">Retirar Carta</button>
<button onclick="embaralharDeck()">Embaralhar o Deck</button>
<button onclick="resetarDeck()">Recolher cartas e Embaralhar o Deck</button>

<div class="area-cartas" id="mesa"></div>

<script>

//////////////////////////////////////////////////////////////
// 🔴 BANCO DE DADOS (EDITE AQUI)
//////////////////////////////////////////////////////////////
const bancoOriginal = [
  { nome: "Carta 1", arquivo: "imagens/carta01.png" },
  { nome: "Carta 2", arquivo: "imagens/carta02.png" },
  { nome: "Carta 3", arquivo: "imagens/carta03.png" },
  { nome: "Carta 4", arquivo: "imagens/carta04.png" },

  { nome: "Carta 6", arquivo: "imagens/carta06.png" },
  { nome: "Carta 7", arquivo: "imagens/carta07.png" },
  { nome: "Carta 8", arquivo: "imagens/carta08.png" },
  { nome: "Carta 9", arquivo: "imagens/carta09.png" },
  { nome: "Carta 10", arquivo: "imagens/carta10.png" },
  { nome: "Carta 11", arquivo: "imagens/carta11.png" },
  { nome: "Carta 12", arquivo: "imagens/carta12.png" },
  { nome: "Carta 13", arquivo: "imagens/carta13.png" },
  { nome: "Carta 14", arquivo: "imagens/carta14.png" },
  { nome: "Carta 15", arquivo: "imagens/carta15.png" },
  { nome: "Carta 16", arquivo: "imagens/carta16.png" },
  { nome: "Carta 17", arquivo: "imagens/carta17.png" },
  { nome: "Carta 18", arquivo: "imagens/carta18.png" },

  { nome: "Carta 22", arquivo: "imagens/carta22.png" },
  { nome: "Carta 23", arquivo: "imagens/carta23.png" },
  { nome: "Carta 24", arquivo: "imagens/carta24.png" },
  { nome: "Carta 25", arquivo: "imagens/carta25.png" },
  { nome: "Carta 26", arquivo: "imagens/carta26.png" },

  { nome: "Carta 35", arquivo: "imagens/carta35.png" },
  { nome: "Carta 36", arquivo: "imagens/carta36.png" }
];
//////////////////////////////////////////////////////////////

let deck = [];
let cartasRetiradas = [];

resetarDeck();

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function retirarCarta() {
  if (deck.length === 0) {
    alert("Todas as cartas já foram retiradas!");
    return;
  }

  const carta = deck.pop();
  cartasRetiradas.push(carta);

  mostrarCarta(carta);
}

function embaralharDeck() {
  embaralhar(deck);
}

function resetarDeck() {
  deck = [...bancoOriginal];
  cartasRetiradas = [];
  embaralhar(deck);
  document.getElementById("mesa").innerHTML = "";
}

function mostrarCarta(carta) {
  const mesa = document.getElementById("mesa");

  const div = document.createElement("div");
  div.className = "carta";

  div.innerHTML = `
    <p>${carta.nome}</p>
    <img src="${carta.arquivo}">
  `;

  mesa.appendChild(div);
}

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
